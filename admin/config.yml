backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "stories"
    label: "Stories"
    folder: "_stories"
    create: true
    fields:
      - label: "Quote"
        name: "quote"
        widget: "text"
      - label: "Author"
        name: "author"
        widget: "string"

  - name: "services"
    label: "Services"
    folder: "_services"
    create: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Category"
        name: "category"
        widget: "string"
      - label: "Description"
        name: "body"
        widget: "text"
      - label: "Location"
        name: "location"
        widget: "string"
      - label: "Cost"
        name: "cost"
        widget: "string"

  - name: "homepage"
    label: "Home Page"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "_data/hero.md"
        fields:
          - label: "Main Heading"
            name: "heading"
            widget: "string"
          - label: "Description"
            name: "description"
            widget: "text"
          - label: "Stat 1 Number"
            name: "stat1_number"
            widget: "string"
          - label: "Stat 1 Label"
            name: "stat1_label"
            widget: "string"
          - label: "Stat 2 Number"
            name: "stat2_number"
            widget: "string"
          - label: "Stat 2 Label"
            name: "stat2_label"
            widget: "string"
          - label: "Stat 3 Number"
            name: "stat3_number"
            widget: "string"
          - label: "Stat 3 Label"
            name: "stat3_label"
            widget: "string"
          - label: "Stat 4 Number"
            name: "stat4_number"
            widget: "string"
          - label: "Stat 4 Label"
            name: "stat4_label"
            widget: "string"
