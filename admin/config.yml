backend:
  name: github
  repo: nobu2002/the-coffee-table
  branch: main

media_folder: images

collections:
  - name: stories
    label: Stories
    folder: _stories
    create: true
    fields:
      - label: Quote
        name: quote
        widget: text
      - label: Author
        name: author
        widget: string

  - name: services
    label: Services
    folder: _services
    create: true
    fields:
      - label: Title
        name: title
        widget: string
      - label: Category
        name: category
        widget: string
      - label: Description
        name: body
        widget: text
      - label: Location
        name: location
        widget: string
      - label: Cost
        name: cost
        widget: string

  - name: settings
    label: Home Page
    folder: _homepage
    create: false
    files:
      - label: Home Page Settings
        name: home
        file: _homepage/home.md
        fields:
          - label: Main Heading
            name: heading
            widget: string
          - label: Description
            name: description
            widget: text
          - label: Stat 1 Number
            name: stat1_number
            widget: string
          - label: Stat 1 Label
            name: stat1_label
            widget: string
          - label: Stat 2 Number
            name: stat2_number
            widget: string
          - label: Stat 2 Label
            name: stat2_label
            widget: string
